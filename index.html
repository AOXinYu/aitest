<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snake</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="panel">
        <div class="hero">
          <p class="eyebrow">Arcade Classic</p>
          <h1>Snake</h1>
        </div>

        <div class="status">
          <div>
            <p class="label">Score</p>
            <p class="value" id="score">0</p>
          </div>
          <div>
            <p class="label">State</p>
            <p class="value" id="game-status">Running</p>
          </div>
        </div>

        <div class="actions">
          <button id="pause-button" type="button">Pause</button>
          <button id="restart-button" type="button">Restart</button>
        </div>

        <p class="hint" id="status-hint" aria-live="polite">
          Use arrow keys or WASD to steer. Press Space to pause.
        </p>

        <div
          id="board"
          class="board"
          role="grid"
          aria-label="Snake game board"
        ></div>

        <div class="controls" aria-label="Touch controls">
          <button class="control up" data-direction="up" type="button">Up</button>
          <button class="control left" data-direction="left" type="button">
            Left
          </button>
          <button class="control right" data-direction="right" type="button">
            Right
          </button>
          <button class="control down" data-direction="down" type="button">
            Down
          </button>
        </div>
      </section>
    </main>

    <script type="module" src="./snake-app.mjs"></script>
  </body>
</html>
